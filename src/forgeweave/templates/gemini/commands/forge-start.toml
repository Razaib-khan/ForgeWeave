description = "Complete overview of the ForgeWeave framework — read this first when starting work"
prompt = """
# ForgeWeave Framework Overview

Run `/forge-start` at the beginning of every session.

## What is ForgeWeave?
Framework-agnostic agent orchestration layer. CLI (`forge`) + TUI templates for opencode, claude, qwen, gemini.

## Architecture
- `forge-mcp/` — Control Plane: 12 forge.* tools
- `research-mcp/` — Data Plane: 10 research_* tools (used internally by forge.research)
- `Templates/<tui>/` — agents/, commands/, hooks/, skills/

## CLI
- `forge init --tui <name>` — scaffold project
- `forge doctor` — check Python 3.14+, templates
- `forge mcp` — start ForgeWeave MCP server

## Deep Research
Run `/forge-research <topic>`. Calls `forge.research` — pipeline stages are internal.

## ForgeWeave Tools
forge.init, forge.execute_command, forge.execute_skill, forge.create_agent,
forge.research, forge.search, forge.load_context, forge.validate,
forge.memory_read, forge.memory_write, forge.status, forge.capabilities

## Hooks
12 lifecycle hooks: pre/post command, pre/post skill, pre/post research,
research_iteration, research_complete, pre/post agent_create, pre/post file_write

## Rules
- Design principle: Expose capabilities. Hide orchestration.
- Sources: official docs, API refs, usage guides ONLY
- Every claim needs a source URL
- Python 3.14+
"""

